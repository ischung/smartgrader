name: Kanban Auto Done

on:
  pull_request:
    types: [closed]

jobs:
  move-to-done:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.KANBAN_TOKEN || secrets.GITHUB_TOKEN }}

    steps:
      - name: Move linked issues to Done
        run: |
          PR_BODY="${{ github.event.pull_request.body }}"
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          # PR 본문에서 연결된 이슈 번호 추출 (Closes #N, Fixes #N, Resolves #N)
          ISSUE_NUMBERS=$(echo "$PR_BODY" | grep -oiP '(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#\K[0-9]+' || true)

          if [ -z "$ISSUE_NUMBERS" ]; then
            echo "연결된 이슈 없음. 종료."
            exit 0
          fi

          echo "연결된 이슈: $ISSUE_NUMBERS"

          # 최근 업데이트된 프로젝트 번호 조회
          PROJECT_NUMBER=$(gh api graphql -f query='
            query($owner: String!) {
              repositoryOwner(login: $owner) {
                ... on User {
                  projectsV2(first: 1, orderBy: {field: UPDATED_AT, direction: DESC}) {
                    nodes { number title }
                  }
                }
                ... on Organization {
                  projectsV2(first: 1, orderBy: {field: UPDATED_AT, direction: DESC}) {
                    nodes { number title }
                  }
                }
              }
            }' -f owner="$OWNER" \
            --jq '.data.repositoryOwner | (.projectsV2? // .projectsV2?) | .nodes[0].number' 2>/dev/null || echo "")

          if [ -z "$PROJECT_NUMBER" ]; then
            echo "프로젝트를 찾을 수 없음. 종료."
            exit 0
          fi

          echo "프로젝트 번호: $PROJECT_NUMBER"

          # 프로젝트 ID, Status 필드 ID, Done 옵션 ID 조회
          PROJECT_META=$(gh api graphql -f query='
            query($owner: String!, $number: Int!) {
              repositoryOwner(login: $owner) {
                ... on User {
                  projectV2(number: $number) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id name
                          options { id name }
                        }
                      }
                    }
                  }
                }
                ... on Organization {
                  projectV2(number: $number) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id name
                          options { id name }
                        }
                      }
                    }
                  }
                }
              }
            }' -f owner="$OWNER" -F number="$PROJECT_NUMBER")

          PROJECT_ID=$(echo "$PROJECT_META" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          owner_data = data['data']['repositoryOwner']
          proj = owner_data.get('projectV2') or owner_data.get('projectV2')
          print(proj['id'])
          ")

          STATUS_FIELD_ID=$(echo "$PROJECT_META" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          owner_data = data['data']['repositoryOwner']
          proj = owner_data.get('projectV2') or owner_data.get('projectV2')
          for field in proj['fields']['nodes']:
              if field and field.get('name') == 'Status':
                  print(field['id'])
                  break
          ")

          DONE_OPTION_ID=$(echo "$PROJECT_META" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          owner_data = data['data']['repositoryOwner']
          proj = owner_data.get('projectV2') or owner_data.get('projectV2')
          for field in proj['fields']['nodes']:
              if field and field.get('name') == 'Status':
                  for opt in field['options']:
                      if opt['name'].lower() == 'done':
                          print(opt['id'])
                          break
          ")

          echo "PROJECT_ID: $PROJECT_ID"
          echo "STATUS_FIELD_ID: $STATUS_FIELD_ID"
          echo "DONE_OPTION_ID: $DONE_OPTION_ID"

          # 각 이슈를 Done으로 이동
          for ISSUE_NUMBER in $ISSUE_NUMBERS; do
            echo "이슈 #$ISSUE_NUMBER 처리 중..."

            # 이슈 Node ID 조회
            ISSUE_ID=$(gh api graphql -f query='
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $number) { id }
                }
              }' -f owner="$OWNER" -f repo="$REPO" -F number="$ISSUE_NUMBER" \
              --jq '.data.repository.issue.id' 2>/dev/null || echo "")

            if [ -z "$ISSUE_ID" ]; then
              echo "이슈 #$ISSUE_NUMBER ID 조회 실패. 건너뜀."
              continue
            fi

            # 프로젝트 아이템 ID 조회
            ITEM_ID=$(gh project item-list "$PROJECT_NUMBER" --owner "$OWNER" --format json --limit 200 | \
              python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for item in data.get('items', []):
              if item.get('content', {}).get('number') == $ISSUE_NUMBER or str(item.get('number','')) == '$ISSUE_NUMBER':
                  print(item['id'])
                  break
          " 2>/dev/null || echo "")

            if [ -z "$ITEM_ID" ]; then
              echo "이슈 #$ISSUE_NUMBER 프로젝트 아이템 없음. 건너뜀."
              continue
            fi

            # Done으로 상태 변경
            gh api graphql -f query='
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) { projectV2Item { id } }
              }' \
              -f projectId="$PROJECT_ID" \
              -f itemId="$ITEM_ID" \
              -f fieldId="$STATUS_FIELD_ID" \
              -f optionId="$DONE_OPTION_ID" > /dev/null

            echo "✅ 이슈 #$ISSUE_NUMBER → Done 이동 완료"
            sleep 0.5
          done
