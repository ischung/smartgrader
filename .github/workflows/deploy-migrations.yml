# ============================================================
# SmartGrader DB 마이그레이션 자동 배포
#
# 트리거: main 브랜치에 supabase/migrations/ 경로 변경이 포함된 push
#
# 필요한 GitHub Secret (Settings → Secrets and variables → Actions):
#   SUPABASE_DB_URL:
#     Supabase 대시보드 → Settings → Database → Connection string
#     → "Session mode" (Pooler) 탭 복사 — 포트 5432, 호스트 aws-0-*.pooler.supabase.com
#     형식: postgres://postgres.[project-ref]:[password]@aws-0-[region].pooler.supabase.com:5432/postgres
#     ⚠️ Direct connection(db.*.supabase.co) 사용 금지 — GitHub Actions는 IPv6 미지원
#     ⚠️ Transaction mode(포트 6543) 사용 금지 — DDL은 세션 유지 필요
# ============================================================
name: Deploy — Supabase DB Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'

  # 수동 실행 지원 (긴급 재적용 또는 dry-run 검증 시 사용)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — 실제 적용 없이 실행 예정 SQL만 출력'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  migrate:
    name: Apply DB Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate migration files exist
        run: |
          echo "=== 적용 예정 마이그레이션 파일 목록 ==="
          ls -la supabase/migrations/ || {
            echo "::error::supabase/migrations/ 디렉터리가 없습니다."
            exit 1
          }
          FILE_COUNT=$(ls supabase/migrations/*.sql 2>/dev/null | wc -l)
          echo "총 마이그레이션 파일 수: $FILE_COUNT"

      - name: Dry run — Show pending migrations
        if: ${{ github.event.inputs.dry_run == 'true' }}
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "=== DRY RUN 모드: 실제 DB에 적용하지 않습니다 ==="
          supabase db push --db-url "$SUPABASE_DB_URL" --dry-run
          echo "::notice::Dry run 완료. 실제 적용하려면 dry_run=false로 재실행하세요."

      - name: Apply migrations to Supabase
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "=== Supabase DB 마이그레이션 시작 ==="
          supabase db push --db-url "$SUPABASE_DB_URL"
          echo "=== 마이그레이션 완료 ==="

      - name: Verify applied migrations
        if: ${{ success() && github.event.inputs.dry_run != 'true' }}
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "=== 적용된 마이그레이션 이력 ==="
          psql "$SUPABASE_DB_URL" \
            -c "SELECT version, inserted_at FROM supabase_migrations.schema_migrations ORDER BY inserted_at;" \
            || echo "::warning::마이그레이션 이력 조회 실패 (권한 문제일 수 있음)"
